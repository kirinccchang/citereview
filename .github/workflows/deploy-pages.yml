name: Deploy Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'worker/**'
      - 'infra/terraform/**'
      - '.github/workflows/cloudflare-domain-automation.yml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy static site to Cloudflare Pages
    runs-on: ubuntu-latest
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=citereview --branch=main
